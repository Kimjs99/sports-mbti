/* ══════ CALC ══════ */
function calcResult(answers) {
  const score = {teamwork:0,explosive:0,endurance:0,precision:0,risk:0,winter:0};
  answers.forEach(a => Object.entries(a.tr||{}).forEach(([k,v]) => { score[k]=(score[k]||0)+v; }));
  const maxP = {teamwork:14,explosive:14,endurance:14,precision:14,risk:12,winter:10};
  const norm = {};
  Object.keys(score).forEach(k => { norm[k]=Math.max(0,Math.min(10,((score[k]+maxP[k]/2)/maxP[k])*10)); });
  let best=null, bestSim=-Infinity;
  SPORTS.forEach(s => {
    let sim=0;
    Object.keys(norm).forEach(k => { sim -= (s.traits[k]-norm[k])**2; });
    if(sim>bestSim){ bestSim=sim; best=s; }
  });
  return {sport:best, score:norm};
}

const Rings = ({size=60, op=0.3}) => (
  <svg width={size*2.2} height={size*.75} viewBox="0 0 220 75" style={{opacity:op}}>
    {["#0081C8","#FCB131","#000","#00A651","#EE334E"].map((c,i)=>(
      <circle key={i} cx={20+i*45} cy={i%2===0?25:45} r={20} fill="none" stroke={c} strokeWidth="5"/>
    ))}
  </svg>
);

const BG_E = ["🏀","⚽","🏐","🏊","🏃","🤸","🥋","🏹","🤺","🏸","🏓","⛷️","⛸️","🥌","🏒","🎿"];
const Blob = ({e, style, dl, dur}) => (
  <div style={{position:"absolute",fontSize:"2rem",opacity:.07,pointerEvents:"none",userSelect:"none",
    animation:`floatY ${dur}s ease-in-out infinite`,animationDelay:`${dl}s`,...style}}>{e}</div>

const Pgbar = ({cur, tot}) => (
  <div style={{width:"100%",marginBottom:"1.5rem"}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:".5rem"}}>
      <span style={{color:"rgba(255,255,255,.5)",fontSize:".75rem"}}>진행률</span>

    </div>
    <div style={{height:"6px",background:"rgba(255,255,255,.1)",borderRadius:"99px",overflow:"hidden"}}>
      <div style={{height:"100%",borderRadius:"99px",background:"linear-gradient(90deg,#FFD700,#FF6B35)",
        width:`${Math.round(cur/tot*100)}%`,transition:"width .5s cubic-bezier(.4,0,.2,1)"}}/>
    </div>
  </div>
);

const Radar = ({score}) => {
  const DIM=["팀워크","순발력","지구력","정밀성","도전성"], KEY=["teamwork","explosive","endurance","precision","risk"];
  const cx=100,cy=100,r=70,n=5;
  const rxy=(i,v)=>{const a=(Math.PI*2*i)/n-Math.PI/2,d=(v/10)*r;return{x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d}};
  const gxy=(i,l)=>{const a=(Math.PI*2*i)/n-Math.PI/2;return{x:cx+Math.cos(a)*(r*l/5),y:cy+Math.sin(a)*(r*l/5)}};
  const pts=KEY.map((k,i)=>rxy(i,score[k]||0));
  const lbl=KEY.map((_,i)=>{const a=(Math.PI*2*i)/n-Math.PI/2;return{x:cx+Math.cos(a)*(r+18),y:cy+Math.sin(a)*(r+18)}});
  return (
    <svg viewBox="0 0 200 200" style={{width:"100%",maxWidth:"220px"}}>
      {[1,2,3,4,5].map(l=><polygon key={l} points={Array.from({length:n},(_,i)=>gxy(i,l)).map(p=>`${p.x},${p.y}`).join(" ")} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth=".8"/>)}
      {Array.from({length:n},(_,i)=>{const p=gxy(i,5);return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(255,255,255,0.1)" strokeWidth=".8"/>})}
      <polygon points={pts.map(p=>`${p.x},${p.y}`).join(" ")} fill="rgba(255,214,0,0.2)" stroke="#FFD700" strokeWidth="2"/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3" fill="#FFD700"/>)}
      {lbl.map((p,i)=><text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fill="rgba(255,255,255,0.7)" fontSize="8" fontFamily="Noto Sans KR">{DIM[i]}</text>)}
    </svg>
  );
};

              <div style={{textAlign:"left",display:"flex",flexDirection:"column",gap:".7rem"}}>
                {sport.bullets.map((b,i)=>(
                  <div key={i} style={{display:"flex",gap:".75rem",alignItems:"flex-start"}}>
                    <div style={{width:"6px",height:"6px",borderRadius:"50%",background:AC,flexShrink:0,marginTop:".5rem"}}/>
                    <span style={{color:"rgba(255,255,255,.7)",fontSize:".85rem",lineHeight:1.6}}>{b}</span>
                  </div>
                ))}
              </div>
            </div>

            <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:"20px",padding:"1.5rem",marginBottom:"1.5rem",display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{color:"rgba(255,255,255,.5)",fontSize:".75rem",letterSpacing:".1em",marginBottom:"1rem"}}>나의 운동 성향 분석</div>
              <Radar score={score}/>
            </div>

            <div style={{display:"flex",justifyContent:"center",marginBottom:"1.5rem"}}><Rings size={60} op={.4}/></div>

            <div style={{display:"flex",gap:".75rem"}}>
              <button onClick={reset} style={{flex:1,padding:".9rem",borderRadius:"14px",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",color:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:".9rem",fontFamily:"'Noto Sans KR'"}}>🔄 처음부터</button>
              <button onClick={()=>{setPhase("quiz");setQi(0);setAns({});setSel(null);setAk(k=>k+1);}} style={{flex:1,padding:".9rem",borderRadius:"14px",background:`linear-gradient(135deg,${isW?"#0081C8":"#FFD700"},${isW?"#00A3E0":"#FF6B35"})`,border:"none",color:isW?"#fff":"#000",cursor:"pointer",fontSize:".9rem",fontWeight:700,fontFamily:"'Noto Sans KR'"}}>📋 재도전하기</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
